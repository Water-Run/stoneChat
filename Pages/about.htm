<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="robots" content="noindex,nofollow" />
<title>stoneChat - About</title>
<link rel="stylesheet" type="text/css" href="css/main.css?v=20260711e" />
<script type="text/javascript" src="js/i18n.js?v=20260711d"></script>
<script type="text/javascript" src="js/api.js?v=20260711d"></script>
<script type="text/javascript" src="js/app.js?v=20260711d"></script>
</head>
<body>
<div class="app-shell">
  <div class="header">
    <div class="header-logo">
      <a href="chat.htm" class="header-home-link">
        <img src="../Assets/logo_icon.png" alt="stoneChat" width="48" height="48" />
        <span data-i18n="app.title">stoneChat</span>
      </a>
    </div>
    <div class="lang-switcher" id="sc-lang-switcher"></div>
    <div class="clear"></div>
  </div>

  <!-- Layout matches the 2026-06 chat.htm About modal (title / body / footer). -->
  <div class="page-dialog">
    <div class="modal-title">
      <span data-i18n="chat.about">About</span>
    </div>
    <div class="modal-body" id="sc-about-body">
      <p>stoneChat</p>
    </div>
    <div class="modal-footer">
      <a class="btn" href="chat.htm" data-i18n="common.close">[Close]</a>
    </div>
  </div>
</div>
<script type="text/javascript">
//<![CDATA[
window.onload = function () {
  var SC = window.SC || null;
  var i18n = (SC && SC.I18n) ? SC.I18n : null;
  var api = (SC && SC.Api) ? SC.Api : null;
  if (api && typeof api.getConfig === 'function') {
    try {
      var cfg = api.getConfig();
      if (cfg && cfg.ok && cfg.data && i18n && i18n.init) {
        i18n.init(cfg.data.langs || ['en'], cfg.data.default_lang || 'en');
      }
    } catch (e) { /* ignore */ }
  } else if (i18n && i18n.init) {
    try { i18n.init(['en'], 'en'); } catch (e0) { /* ignore */ }
  }
  if (i18n && i18n.apply) { try { i18n.apply(); } catch (e2) { /* ignore */ } }
  if (SC && SC.App && typeof SC.App.bootstrapAboutPage === 'function') {
    try { SC.App.bootstrapAboutPage(); } catch (e3) { /* ignore */ }
  }
};
//]]>
</script>
</body>
</html>
