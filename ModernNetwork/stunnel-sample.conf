; stunnel configuration template for stoneChat
;
; This is a REFERENCE ONLY. ModernNetwork/proxy.php generates the
; actual runtime configuration at ModernNetwork/stunnel.conf
; from the values in CONF.ini.
;
; Do not edit this file. It documents the format that proxy.php produces.
;
; The generated config will look like this (with paths filled in):
;
;   client = yes
;   pid = /absolute/path/to/ModernNetwork/stunnel.pid
;   CAfile = /absolute/path/to/ModernNetwork/cacert.pem
;   verify = 2
;
;   [api-tunnel]
;   accept = 127.0.0.1:8443
;   connect = api.example.com:443
;
; Field reference:
;   client = yes           ; act as TLS client (PHP connects to us)
;   pid = ...              ; write process ID to this file
;   CAfile = ...           ; CA bundle to verify remote server certificate
;   verify = 2             ; verify server certificate against CA + hostname
;   accept = 127.0.0.1:N   ; local port PHP connects to
;   connect = host:443     ; remote API endpoint to tunnel to
