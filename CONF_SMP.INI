; stoneChat config file.
;
; Fill in your real LLM credentials and settings below. This file is
; committed to the repository as a template; placeholders are not secrets.
;
; Sections in this file:
;   [server]     - Built-in PHP server port
;   [llm]        - Legacy single-provider defaults (kept for back-compat)
;   [paths]      - External binaries and CA certificate locations
;   [proxy]      - Local stunnel tunnel port
;   [auth]       - Brute-force lockout and session cookie
;   [User NAME]  - Login user and rights
;   [Model NAME] - Model names used by user rights
;   [ui]         - Branding, default language, visual theme
;   [Provider N] - One section per LLM provider; the loader enumerates
;                  them in numeric order. Add as many as you need.

[server]
; Listening port (default 9999)
port = 9999

[llm]
; OpenAI-compatible API base URL
api_base = https://api.openai.com/v1
; API key
api_key = YOUR_API_KEY_HERE
; Model name
model = gpt-3.5-turbo

[paths]
; CA certificate path used for HTTPS verification
ca_cert = ../ModernNetwork/cacert.pem
; stunnel executable path (required for ModernNetwork HTTPS layer)
stunnel = C:\Program Files\stunnel\bin\stunnel.exe

[proxy]
; Local tunnel port (stunnel listens here on 127.0.0.1)
port = 8443

; ---------------------------------------------------------------------------
; [auth] - Login guard.
;
; Users are listed below as [User Admin], [User Guest], ...
; A user logs in by entering that user's password.
; The name after "User" is shown on the chat page.
;
; The lockout counter protects against brute-force guessing:
; after max_attempts failed logins from the same client, further
; attempts are rejected for lockout_seconds. The counter resets on
; a successful login.
; ---------------------------------------------------------------------------
[auth]
; Number of consecutive failed attempts before the client is locked out.
max_attempts = 5
; Lockout duration in seconds. Counter resets on a successful login or
; when this period elapses since the last failure.
lockout_seconds = 300
; Cookie name used to mark an authenticated session. Change this when
; running multiple stoneChat instances on the same host.
cookie_name = sc_auth

; ---------------------------------------------------------------------------
; [User NAME] - Login users and rights.
;
; The NAME part is the user name:
;   [User Admin]  -> user name is Admin
;   [User Guest]  -> user name is Guest
;
; password:
;   The password typed on the login page. Change these sample passwords
;   before putting stoneChat on a real LAN.
;
; active:
;   true  = this user may log in
;   false = this user is disabled
;
; allow_config:
;   true  = this user may open the web CONF.ini editor, but only when
;           [ui] allow_online_editor is also true.
;   false = this user may not edit CONF.ini from the web page.
;
; allow_models:
;   * means all [Model NAME] entries are allowed.
;   Or write model names separated by commas.
;   Example:
;     allow_models = MiniMaxM3,GPT55
; ---------------------------------------------------------------------------
[User Admin]
password = admin123
active = true
allow_config = true
allow_models = *

[User Guest]
password = guestpass
active = true
allow_config = false
allow_models = *

; ---------------------------------------------------------------------------
; [Model NAME] - Model names used by user rights.
;
; NAME is a short, plain model name used in allow_models above.
; A [Provider N] section below points at one model name with model_id.
; Keep names simple: letters and numbers are best on old Windows tools.
; ---------------------------------------------------------------------------
[Model GPT55]
label = GPT-5.5

[Model ClaudeHaiku]
label = Claude Haiku

[Model MockLocal]
label = Mock Local

[Model MiniMaxM3]
label = MiniMax M3

; ---------------------------------------------------------------------------
; [ui] - Frontend presentation. `title` appears in the browser title
; bar and on the login/chat headers. `default_lang` is the language
; used when the user has no saved preference; supported codes are
; en, zh-CN, zh-TW, ja, ko, ru, fr, de. `theme` selects the visual
; style - `classic2001` reproduces a 2001-era look compatible with
; IE6 on Windows XP.
; `allow_online_editor` controls whether the web-based config editor is enabled.
; WARNING: Enabling the online editor introduces potential Remote Code Execution (RCE)
; risks if an attacker gains access to the password.
; `send_shortcut` chooses how the Enter key works in the chat input:
;   enter       = Enter sends, Shift+Enter makes a new line
;   shift_enter = Shift+Enter sends, Enter makes a new line
; ---------------------------------------------------------------------------
[ui]
; Allow editing this configuration file from the web UI.
allow_online_editor = false
; Window and page title shown in the browser chrome.
title = stoneChat
; Fallback language code when the user has not chosen one.
default_lang = en
; Visual theme identifier. `classic2001` = retro 2001-era layout.
theme = classic2001
; Send shortcut shown beside the wait timer.
send_shortcut = enter

; ---------------------------------------------------------------------------
; [Provider 1] - OpenAI-compatible endpoint.
;
; Provider sections are numbered [Provider 1], [Provider 2], ... in the
; order you want them to appear in the provider dropdown. Each section
; uses the same key layout:
;   id       - machine-readable slug, used in URLs and JS state
;   active   - 1 = enabled, 0 = kept as a sample and ignored
;   model_id - model permission name from [Model NAME]
;   label    - human-readable name shown in the UI
;   type     - dispatch mode: `openai` (chat/completions, Bearer auth)
;              or `anthropic` (messages endpoint, x-api-key auth)
;   api_base - base URL of the API; the loader appends the right path
;              for each `type`
;   api_key  - shared secret. PLACEHOLDER ONLY; do not commit a real
;              key. Edit the installed CONF.ini with Notepad and keep
;              your real deployment copy out of public archives.
;   model    - default model id sent to the API on each request
; ---------------------------------------------------------------------------
[Provider 1]
; Stable slug used internally and returned by /api/providers.
id = openai
active = 0
model_id = GPT55
; Display label shown in the provider dropdown.
label = OpenAI ChatGPT
; Dispatch type. `openai` -> /v1/chat/completions with Bearer auth.
type = openai
; Base URL; the loader appends `/chat/completions`.
api_base = https://api.openai.com/v1
; Replace with your real key. Never commit a real secret to git.
api_key = YOUR_OPENAI_API_KEY_HERE
; Default model id; the client may override per request.
model = gpt-3.5-turbo

; ---------------------------------------------------------------------------
; [Provider 2] - Anthropic Claude endpoint.
;
; Same key layout as [Provider 1] but `type = anthropic` switches the
; dispatcher to /v1/messages with x-api-key + anthropic-version
; headers. Add more [Provider N] sections for any other vendor that
; follows either protocol.
; ---------------------------------------------------------------------------
[Provider 2]
; Stable slug.
id = anthropic
active = 0
model_id = ClaudeHaiku
; Display label.
label = Anthropic Claude
; Dispatch type. `anthropic` -> /v1/messages with x-api-key auth.
type = anthropic
; Base URL; the loader appends `/messages`.
api_base = https://api.anthropic.com/v1
; Replace with your real Anthropic key.
api_key = YOUR_ANTHROPIC_API_KEY_HERE
; Default model id.
model = claude-3-haiku-20240307

; ---------------------------------------------------------------------------
; [Provider 3] - Mock Local Provider
;
; Connects directly to the local mock endpoint for testing and validation.
; ---------------------------------------------------------------------------
[Provider 3]
id = mock
active = 1
model_id = MockLocal
label = Mock Local Provider
type = openai
api_base = http://localhost:9998/Server/api/mock_llm.php
api_key = mock_key
model = mock-gpt
stream = true

; ---------------------------------------------------------------------------
; [Provider 4] - Minimax (China Token Plan) Example
;
; An example of configuring an OpenAI-compatible third-party provider.
; Minimax uses the standard `openai` type, but points to their specific URL.
; ---------------------------------------------------------------------------
[Provider 4]
id = minimax
active = 0
model_id = MiniMaxM3
label = Minimax M3
type = openai
api_base = https://api.minimaxi.com/v1
api_key = YOUR_MINIMAX_API_KEY_HERE
model = MiniMax-M3
stream = true
