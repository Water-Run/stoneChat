; ---------------------------------------------------------------------------
[Provider 4]
id = minimax
label = Minimax M3
type = openai
api_base = https://api.minimaxi.com/v1
api_key = sk-cp-_YkrURbBasiolIm82cavBI_TAzd_soIjHY-vEKNRcUPIF-3eqKhKAp9orV007RE5Lv_42-ZXLoFYnIfySawDExrYSbyKVe8yz0MTWCSRjXTvkumkfBGL13s
